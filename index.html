<script>
  function toggleFaq(el) {
    const item = el.parentElement;
    item.classList.toggle('open');
  }

  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); e.target.classList.remove('hidden-before-reveal'); }
    });
  }, { threshold: 0.1 });
  reveals.forEach(r => { r.classList.add('hidden-before-reveal'); observer.observe(r); });
</script>
